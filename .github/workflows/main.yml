name: DataProviders Build

# Continuous integration: build + test + coverage on every push and PR.
# Publishing to NuGet lives in release.yml (push a vX.Y.Z tag).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BuildConfiguration: Release

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # coverage PR comment (marocchino/sticky-pull-request-comment)

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Set version number
      run:  '& ${{github.workspace}}/.github/workflows/UpdateVersion.ps1 ${{github.run_number}}'
      shell: pwsh

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration $BuildConfiguration

    - name: Test
      run: dotnet test --configuration $BuildConfiguration --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Create nuget packages
      run: dotnet pack --configuration $BuildConfiguration --no-build

    - uses: actions/upload-artifact@v4
      with:
        name: Nuget Packages
        path: ${{github.workspace}}/src/**/*.nupkg

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Merge and generate coverage report
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage/report" \
          -reporttypes:"MarkdownSummaryGithub;Cobertura" \
          -assemblyfilters:"-*.Tests"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage/report/Cobertura.xml
        fail_ci_if_error: false

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: coverage/report/SummaryGithub.md
